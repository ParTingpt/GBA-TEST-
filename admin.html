<!doctype html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>GBA后台记录</title><link rel="stylesheet" href="styles.css"></head><body><div class="wrap"><section class="card"><h1>GBA测评后台记录</h1><p class="note">本页面用于查看已经保存到后台的测评记录。点击“查看详情”可查看完整结果和 trial 级原始行为数据。</p><button class="btn" onclick="loadList()">刷新记录</button><table class="table"><thead><tr><th>编号</th><th>姓名</th><th>年龄</th><th>年级</th><th>总体风险</th><th>保存时间</th><th>操作</th></tr></thead><tbody id="list"></tbody></table></section><section class="card"><h2>记录详情</h2><pre id="detail" class="admin-json">请选择一条记录。</pre></section></div><script>async function loadList(){const res=await fetch('/api/assessments');const data=await res.json();document.getElementById('list').innerHTML=data.map(x=>`<tr><td>${x.id}</td><td>${x.name||''}</td><td>${x.age||''}</td><td>${x.grade||''}</td><td>${x.overall||''}</td><td>${x.saved_at||''}</td><td><button class="btn ghost" onclick="loadDetail('${x.id}')">查看详情</button></td></tr>`).join('')||'<tr><td colspan="7">暂无记录</td></tr>'}async function loadDetail(id){const res=await fetch('/api/assessments/'+id);const data=await res.json();document.getElementById('detail').textContent=JSON.stringify(data,null,2)}loadList();</script></body></html>
